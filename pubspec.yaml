name: flutter_application
description: "TaskFlow — A production-grade Flutter Todo app with Clean Architecture."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0
  google_fonts: ^6.2.1

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Networking
  dio: ^5.8.0+1

  # Dependency Injection
  get_it: ^8.0.3

  # Navigation
  go_router: ^14.8.1

  # Storage
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
